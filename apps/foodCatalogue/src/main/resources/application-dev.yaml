
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3307/restaurantdb}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  cloud:
    discovery:
      enabled: true
    inetutils:
      preferred-networks:
        - 192.168
  
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
      
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    com.sdewa.RestaurantListing: DEBUG

  org.hibernate.SQL: DEBUG
  org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  org.springframework.web: DEBUG